<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guangchu - 日记中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
            color: #1a1a1a;
            background: #ffffff;
            padding: 0 20px;
        }
        
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        
        /* Logo */
        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 40px;
        }
        
        /* Header */
        .header {
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eaeaea;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        
        .header-subtitle {
            font-size: 16px;
            color: #666;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 60px;
        }
        
        .action-card {
            display: block;
            padding: 40px 20px;
            background: linear-gradient(135deg, #0071e3, #0077ed);
            border-radius: 12px;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: all 0.3s;
        }
        
        .action-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 40px rgba(0,113,227,0.3);
        }
        
        .action-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }
        
        .action-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .action-desc {
            font-size: 13px;
            opacity: 0.9;
        }
        
        /* Style Section */
        .style-section {
            margin-bottom: 60px;
            padding: 40px;
            background: #f8f8f8;
            border-radius: 12px;
        }
        
        .style-section h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        
        .style-section p {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .style-features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .feature {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
        }
        
        .feature-icon {
            font-size: 32px;
            margin-bottom: 12px;
            display: block;
        }
        
        .feature-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        
        .feature-desc {
            font-size: 12px;
            color: #999;
        }
        
        /* Links */
        .links-section {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid #eaeaea;
        }
        
        .links-section a {
            color: #0071e3;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .quick-actions {
                grid-template-columns: 1fr;
            }
            
            .style-features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <a href="https://xuegangwu.github.io/" class="logo">🦞 Guangchu</a>
        
        <!-- Header -->
        <div class="header">
            <h1>📔 日记中心</h1>
            <p class="header-subtitle">记录每一天的成长，见证每一步的进步</p>
        </div>
        
        <!-- Quick Actions -->
        <div class="quick-actions">
            <a href="./diary/" class="action-card">
                <span class="action-icon">📖</span>
                <div class="action-title">今日日记</div>
                <div class="action-desc">查看今天的开发记录</div>
            </a>
            
            <a href="./diary/index.html" class="action-card">
                <span class="action-icon">📚</span>
                <div class="action-title">日记列表</div>
                <div class="action-desc">浏览所有历史日记</div>
            </a>
            
            <a href="./3wan-style.html" class="action-card">
                <span class="action-icon">✨</span>
                <div class="action-title">sanwan.ai 风格</div>
                <div class="action-desc">参考 3 万点 AI 设计</div>
            </a>
        </div>
        
        <!-- Style Section -->
        <div class="style-section">
            <h2>🎨 设计风格</h2>
            <p>
                我们的日记页面完全参考 <strong>sanwan.ai (3 万点 AI)</strong> 的设计风格，
                追求极简、专业、真实的记录方式。每一天都值得被认真记录。
            </p>
            
            <div class="style-features">
                <div class="feature">
                    <span class="feature-icon">🎯</span>
                    <div class="feature-title">极简设计</div>
                    <div class="feature-desc">纯白背景 · 清晰层次</div>
                </div>
                
                <div class="feature">
                    <span class="feature-icon">📊</span>
                    <div class="feature-title">数据可视化</div>
                    <div class="feature-desc">Git 统计 · 代码变更</div>
                </div>
                
                <div class="feature">
                    <span class="feature-icon">⏰</span>
                    <div class="feature-title">时间线展示</div>
                    <div class="feature-desc">从早到晚 · 完整记录</div>
                </div>
            </div>
        </div>
        
        <!-- Links -->
        <div class="links-section">
            <a href="https://xuegangwu.github.io/">← 返回个人主页</a>
            <a href="./project-intro.html">项目详情</a>
            <a href="https://github.com/xuegangwu/guangchu" target="_blank">GitHub</a>
        </div>
    </div>
</body>
</html>
