
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光储龙虾 - 数据可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #0071e3 0%, #0077ed 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            padding: 60px 20px;
            margin-bottom: 40px;
        }
        .header h1 { font-size: 40px; margin-bottom: 10px; }
        .header p { font-size: 18px; opacity: 0.9; }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        .chart-card {
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .chart-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1d1d1f;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .stat-value { font-size: 36px; font-weight: 700; color: #0071e3; margin-bottom: 8px; }
        .stat-label { font-size: 14px; color: #86868b; }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: white;
            color: #0071e3;
            text-decoration: none;
            border-radius: 980px;
            font-weight: 600;
        }
        @media (max-width: 768px) {
            .chart-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 光储龙虾 - 数据可视化</h1>
            <p>News Analytics Dashboard</p>
            <a href="index.html" class="back-link">← 返回项目首页</a>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">70</div>
                <div class="stat-label">总新闻数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">4</div>
                <div class="stat-label">数据天数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">17</div>
                <div class="stat-label">日均新闻</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">20</div>
                <div class="stat-label">单日最高</div>
            </div>
        </div>
        
        <div class="chart-grid">
            <div class="chart-card">
                <h2 class="chart-title">📈 新闻趋势（按日期）</h2>
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-card">
                <h2 class="chart-title">🌍 区域分布</h2>
                <canvas id="regionChart"></canvas>
            </div>
            <div class="chart-card">
                <h2 class="chart-title">📋 类型分布</h2>
                <canvas id="typeChart"></canvas>
            </div>
            <div class="chart-card">
                <h2 class="chart-title">📰 来源分布</h2>
                <canvas id="sourceChart"></canvas>
            </div>
        </div>
        
        <div style="text-align: center;">
            <a href="index.html" class="back-link">← 返回项目首页</a>
        </div>
    </div>
    
    <script>
        // 新闻趋势图
        new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: {
                labels: ["2026-03-10", "2026-03-11", "2026-03-12", "2026-03-14"],
                datasets: [{
                    label: '新闻数量',
                    data: [20, 20, 20, 10],
                    borderColor: '#0071e3',
                    backgroundColor: 'rgba(0, 113, 227, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
        
        // 区域分布图
        new Chart(document.getElementById('regionChart'), {
            type: 'doughnut',
            data: {
                labels: ["Global", "Southeast Asia", "US", "Europe", "Japan"],
                datasets: [{
                    data: [15, 3, 35, 16, 1],
                    backgroundColor: ['#0071e3', '#34c759', '#ff9500', '#5856d6', '#ff2d55']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
        
        // 类型分布图
        new Chart(document.getElementById('typeChart'), {
            type: 'bar',
            data: {
                labels: ["\u4ea7\u54c1", "\u653f\u7b56", "\u5176\u4ed6", "\u9879\u76ee"],
                datasets: [{
                    label: '数量',
                    data: [19, 11, 19, 21],
                    backgroundColor: '#0071e3'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
        
        // 来源分布图
        new Chart(document.getElementById('sourceChart'), {
            type: 'pie',
            data: {
                labels: ["PV Magazine", "Energy Storage News"],
                datasets: [{
                    data: [30, 40],
                    backgroundColor: ['#0071e3', '#34c759', '#ff9500', '#5856d6', '#ff2d55']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    </script>
</body>
</html>
