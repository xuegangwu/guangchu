<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光储龙虾 - 开发日记 | 2026 年 03 月 11 日</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #ffffff;
            padding: 20px;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        .header {
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eaeaea;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        .header-meta {
            font-size: 14px;
            color: #999;
        }
        .header-meta span {
            margin-right: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 60px;
            padding: 30px;
            background: #f8f8f8;
            border-radius: 12px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #0071e3;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .stat-label {
            font-size: 13px;
            color: #666;
        }
        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        .log-list {
            position: relative;
            padding-left: 40px;
            margin-bottom: 60px;
        }
        .log-list::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e0e0e0;
        }
        .log-item {
            position: relative;
            margin-bottom: 30px;
        }
        .log-time {
            position: absolute;
            left: -40px;
            top: 0;
            width: 32px;
            height: 32px;
            background: #0071e3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        .log-content {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 8px;
        }
        .log-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .log-text {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }
        .footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid #eaeaea;
            color: #999;
            font-size: 14px;
        }
        .footer-links {
            margin-top: 20px;
        }
        .footer-links a {
            color: #0071e3;
            text-decoration: none;
            margin: 0 10px;
        }
        @media (max-width: 768px) {
            .container { padding: 40px 20px; }
            .header h1 { font-size: 24px; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦞 光储龙虾 - 开发日记</h1>
            <div class="header-meta">
                <span>2026 年 03 月 11 日</span>
                <span>第 0 天</span>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">8</div>
                <div class="stat-label">今日提交</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">5</div>
                <div class="stat-label">文件变更</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">+1500</div>
                <div class="stat-label">新增代码</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">-50</div>
                <div class="stat-label">删除代码</div>
            </div>
        </div>
        
        <h2 class="section-title">工作日志</h2>
        <div class="log-list">
            
            <div class="log-item">
                <div class="log-time">09:00</div>
                <div class="log-content">
                    <div class="log-title">项目启动</div>
                    <div class="log-text">光储龙虾项目正式启动，确定技术栈和架构</div>
                </div>
            </div>
            <div class="log-item">
                <div class="log-time">11:00</div>
                <div class="log-content">
                    <div class="log-title">信息源配置</div>
                    <div class="log-text">配置 22 个信息源，包括政府/媒体/制造商</div>
                </div>
            </div>
            <div class="log-item">
                <div class="log-time">14:00</div>
                <div class="log-content">
                    <div class="log-title">抓取脚本开发</div>
                    <div class="log-text">开发新闻抓取脚本，实现自动化数据收集</div>
                </div>
            </div>
            <div class="log-item">
                <div class="log-time">16:00</div>
                <div class="log-content">
                    <div class="log-title">GitHub Pages 部署</div>
                    <div class="log-text">配置 GitHub Pages，部署首个页面</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 光储龙虾</p>
            <div class="footer-links">
                <a href="../">首页</a>
                <a href="./">日记</a>
                <a href="https://github.com/xuegangwu/guangchu">GitHub</a>
            </div>
        </div>
    </div>
</body>
</html>
