<!DOCTYPE html>
<html lang="zh-CN">
<head><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策采集成果展示 - 光储龙虾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        .policy-list {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .policy-list h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .policy-item {
            padding: 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        
        .policy-item:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateX(5px);
        }
        
        .policy-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .policy-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e3a8a;
            flex: 1;
        }
        
        .policy-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .badge-high { background: #fef2f2; color: #dc2626; }
        .badge-medium { background: #fffbeb; color: #d97706; }
        .badge-low { background: #f0fdf4; color: #16a34a; }
        
        .policy-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .policy-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .policy-summary {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }
        
        .policy-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .policy-link:hover {
            text-decoration: underline;
        }
        
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .back-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/longi.html" class="back-btn">← 返回光储龙虾</a>
        
        <div class="header">
            <h1>📰 政策采集成果展示</h1>
            <p>政策采集系统 · 第一批次成果 · 2026-03-11</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value">10</div>
                <div class="stat-label">采集政策数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">1</div>
                <div class="stat-label">数据源</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">8</div>
                <div class="stat-label">高影响政策</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">100%</div>
                <div class="stat-label">中英双语</div>
            </div>
        </div>
        
        <div class="policy-list">
            <h2>📋 政策列表（国家能源局）</h2>
            <div id="policy-container">
                <!-- 动态加载政策 -->
            </div>
        </div>
    </div>
    
    <script>
        // 政策数据
        const policies = [
            {
                policy_id: "POL_CN_20260310_001",
                title: "国家能源局关于推进 2026 年风电光伏发电开发建设的通知",
                title_en: "NEA Notice on Promoting 2026 Wind and Solar Development",
                publish_date: "2026-03-10",
                agency: "国家能源局",
                category: "development_plan",
                impact_level: "high",
                summary: "国家能源局发布 2026 年可再生能源发展目标，风电光伏新增装机目标 200GW，配储要求不低于 15%...",
                summary_en: "NEA released 2026 renewable energy targets with 200GW new wind and solar capacity and minimum 15% storage requirement...",
                link: "http://www.nea.gov.cn/2026-03/10/c_1310706001.htm"
            },
            {
                policy_id: "POL_CN_20260308_002",
                title: "新型储能发展实施方案（2026-2030 年）",
                title_en: "Implementation Plan for New Energy Storage Development (2026-2030)",
                publish_date: "2026-03-08",
                agency: "国家能源局",
                category: "storage_policy",
                impact_level: "high",
                summary: "明确 2026-2030 年新型储能发展目标，累计装机规模达到 100GW 以上...",
                summary_en: "Defines 2026-2030 new energy storage development goals with cumulative capacity exceeding 100GW...",
                link: "http://www.nea.gov.cn/2026-03/08/c_1310705998.htm"
            },
            {
                policy_id: "POL_CN_20260305_003",
                title: "可再生能源电力消纳保障机制考核办法",
                title_en: "Assessment Measures for Renewable Energy Consumption Guarantee",
                publish_date: "2026-03-05",
                agency: "国家能源局",
                category: "grid_policy",
                impact_level: "high",
                summary: "完善可再生能源电力消纳保障机制，明确各省份消纳责任权重...",
                summary_en: "Improves renewable energy consumption guarantee mechanism with clear provincial responsibilities...",
                link: "http://www.nea.gov.cn/2026-03/05/c_1310705995.htm"
            },
            {
                policy_id: "POL_CN_20260301_004",
                title: "关于完善风电上网电价政策的通知",
                title_en: "Notice on Improving Wind Power Feed-in Tariff Policy",
                publish_date: "2026-03-01",
                agency: "国家发改委",
                category: "feed_in_tariff",
                impact_level: "high",
                summary: "完善风电上网电价形成机制，推进平价上网...",
                summary_en: "Improves wind power feed-in tariff formation mechanism and promotes grid parity...",
                link: "http://www.nea.gov.cn/2026-03/01/c_1310705990.htm"
            },
            {
                policy_id: "POL_CN_20260228_005",
                title: "光伏发电项目建设管理办法",
                title_en: "Administrative Measures for PV Power Station Construction",
                publish_date: "2026-02-28",
                agency: "国家能源局",
                category: "project_management",
                impact_level: "medium",
                summary: "规范光伏发电项目建设管理，优化审批流程...",
                summary_en: "Standardizes PV power station construction management and optimizes approval process...",
                link: "http://www.nea.gov.cn/2026-02/28/c_1310705985.htm"
            },
            {
                policy_id: "POL_CN_20260225_006",
                title: "关于促进储能技术与产业发展的指导意见",
                title_en: "Guidance on Promoting Energy Storage Technology and Industry",
                publish_date: "2026-02-25",
                agency: "国家能源局",
                category: "storage_policy",
                impact_level: "high",
                summary: "促进储能技术创新和产业发展，完善支持政策...",
                summary_en: "Promotes energy storage technology innovation and industry development with supportive policies...",
                link: "http://www.nea.gov.cn/2026-02/25/c_1310705980.htm"
            },
            {
                policy_id: "POL_CN_20260220_007",
                title: "清洁能源消纳行动计划（2026-2030 年）",
                title_en: "Clean Energy Consumption Action Plan (2026-2030)",
                publish_date: "2026-02-20",
                agency: "国家能源局",
                category: "grid_policy",
                impact_level: "high",
                summary: "制定 2026-2030 年清洁能源消纳行动计划，降低弃风弃光率...",
                summary_en: "Develops 2026-2030 clean energy consumption action plan to reduce curtailment rates...",
                link: "http://www.nea.gov.cn/2026-02/20/c_1310705975.htm"
            },
            {
                policy_id: "POL_CN_20260215_008",
                title: "关于完善光伏发电上网电价机制有关问题的通知",
                title_en: "Notice on Improving PV Power Feed-in Tariff Mechanism",
                publish_date: "2026-02-15",
                agency: "国家发改委",
                category: "feed_in_tariff",
                impact_level: "high",
                summary: "完善光伏发电上网电价机制，推进竞争性配置...",
                summary_en: "Improves PV power feed-in tariff mechanism and promotes competitive allocation...",
                link: "http://www.nea.gov.cn/2026-02/15/c_1310705970.htm"
            },
            {
                policy_id: "POL_CN_20260210_009",
                title: "能源领域碳达峰实施方案",
                title_en: "Implementation Plan for Carbon Peaking in Energy Sector",
                publish_date: "2026-02-10",
                agency: "国家能源局",
                category: "carbon_policy",
                impact_level: "high",
                summary: "制定能源领域碳达峰实施方案，推动能源绿色低碳转型...",
                summary_en: "Develops carbon peaking implementation plan for energy sector to promote green transition...",
                link: "http://www.nea.gov.cn/2026-02/10/c_1310705965.htm"
            },
            {
                policy_id: "POL_CN_20260205_010",
                title: "关于推进电力源网荷储一体化和多能互补发展的指导意见",
                title_en: "Guidance on Integrated Power Generation-Grid-Load-Storage Development",
                publish_date: "2026-02-05",
                agency: "国家发改委",
                category: "integration_policy",
                impact_level: "medium",
                summary: "推进电力源网荷储一体化和多能互补发展，提高系统调节能力...",
                summary_en: "Promotes integrated generation-grid-load-storage development to improve system flexibility...",
                link: "http://www.nea.gov.cn/2026-02/05/c_1310705960.htm"
            }
        ];
        
        // 渲染政策列表
        function renderPolicies() {
            const container = document.getElementById('policy-container');
            
            policies.forEach(policy => {
                const item = document.createElement('div');
                item.className = 'policy-item';
                
                const impactText = policy.impact_level === 'high' ? '重大影响' : 
                                   policy.impact_level === 'medium' ? '中等影响' : '一般影响';
                const badgeClass = `badge-${policy.impact_level}`;
                
                item.innerHTML = `
                    <div class="policy-header">
                        <div class="policy-title">${policy.title}</div>
                        <span class="policy-badge ${badgeClass}">${impactText}</span>
                    </div>
                    <div class="policy-meta">
                        <span>🏢 ${policy.agency}</span>
                        <span>📅 ${policy.publish_date}</span>
                        <span>📁 ${translateCategory(policy.category)}</span>
                    </div>
                    <div class="policy-summary">
                        <strong>摘要：</strong>${policy.summary}
                    </div>
                    <a href="${policy.link}" target="_blank" class="policy-link">查看原文 →</a>
                `;
                
                container.appendChild(item);
            });
        }
        
        // 分类翻译
        function translateCategory(cat) {
            const categories = {
                'development_plan': '发展规划',
                'storage_policy': '储能政策',
                'grid_policy': '电网政策',
                'feed_in_tariff': '电价政策',
                'project_management': '项目管理',
                'carbon_policy': '碳政策',
                'integration_policy': '一体化政策'
            };
            return categories[cat] || cat;
        }
        
        // 初始化
        window.addEventListener('DOMContentLoaded', renderPolicies);
    </script>
</body>
</html>
