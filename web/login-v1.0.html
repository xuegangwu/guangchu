<!DOCTYPE html>
<html lang="zh-CN">
<head><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 光储电站投资地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-logo { font-size: 48px; margin-bottom: 10px; }
        .login-title { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .login-subtitle { font-size: 14px; color: #888; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .checkbox-group { display: flex; align-items: center; gap: 6px; }
        .checkbox-group input { width: 16px; height: 16px; }
        .checkbox-group label { font-size: 13px; color: #666; cursor: pointer; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .alert-error { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffccc7; }
        .alert-success { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .footer { text-align: center; margin-top: 25px; font-size: 13px; color: #888; }
        .quick-login { background: #f9fafb; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .quick-login-title { font-size: 13px; color: #666; margin-bottom: 10px; text-align: center; }
        .quick-login-users { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .quick-user {
            padding: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .quick-user:hover { border-color: #667eea; background: #667eea15; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">🌞</div>
            <h1 class="login-title">光储电站投资地图</h1>
            <p class="login-subtitle">v1.0 企业版 - 用户登录</p>
        </div>
        
        <div id="alert-box" class="alert"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            
            <div class="form-options">
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember">记住我（7 天）</label>
                </div>
            </div>
            
            <button type="submit" class="btn-login">登 录</button>
        </form>
        
        <div class="quick-login">
            <div class="quick-login-title">快速登录（演示账号）</div>
            <div class="quick-login-users">
                <div class="quick-user" onclick="quickLogin('admin', 'admin123')">👤 管理员</div>
                <div class="quick-user" onclick="quickLogin('terry', 'terry123')">👨‍💼 Terry</div>
                <div class="quick-user" onclick="quickLogin('user', 'user123')">👤 普通用户</div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 光储电站投资地图系统 · 内部使用</p>
            <p style="margin-top: 5px; font-size: 12px;">
                <a href="/index.html" style="color: rgba(255,255,255,0.8); text-decoration: none; margin: 0 10px;">🏠 首页</a>
                <span style="color: rgba(255,255,255,0.3);">|</span>
                <a href="/map-v1.0.html" style="color: rgba(255,255,255,0.8); text-decoration: none; margin: 0 10px;">🗺️ 投资地图</a>
                <span style="color: rgba(255,255,255,0.3);">|</span>
                <a href="/vietnam-map.html" style="color: rgba(255,255,255,0.8); text-decoration: none; margin: 0 10px;">🌏 越南地图</a>
                <span style="color: rgba(255,255,255,0.3);">|</span>
                <a href="/digital-twin-simple.html" style="color: rgba(255,255,255,0.8); text-decoration: none; margin: 0 10px;">🏭 数字孪生</a>
                <span style="color: rgba(255,255,255,0.3);">|</span>
                <a href="/longi.html" style="color: rgba(255,255,255,0.8); text-decoration: none; margin: 0 10px;">🦞 光储龙虾</a>
            </p>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://47.90.138.136/api';
        
        function showAlert(message, type = 'error') {
            const alertBox = document.getElementById('alert-box');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
        }
        
        function quickLogin(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            handleLogin(username, password);
        }
        
        async function handleLogin(username, password) {
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    showAlert(data.error || '登录失败', 'error');
                    return;
                }
                
                // 保存 Token 和用户信息
                const userData = {
                    token: data.token,
                    user: data.user,
                    loginTime: new Date().toISOString()
                };
                
                localStorage.setItem('user', JSON.stringify(userData));
                
                showAlert('登录成功，正在跳转...', 'success');
                
                setTimeout(() => {
                    if (data.user.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/map-v1.0.html';
                    }
                }, 1000);
                
            } catch (err) {
                console.error('登录错误:', err);
                showAlert('网络连接失败，请检查后端服务是否启动', 'error');
            }
        }
        
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            handleLogin(username, password);
        });
        
        // 检查是否已登录
        window.addEventListener('DOMContentLoaded', function() {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                const loginTime = new Date(userData.loginTime);
                const now = new Date();
                const diffDays = (now - loginTime) / (1000 * 60 * 60 * 24);
                
                if (diffDays < 7) {
                    showAlert(`欢迎回来，${userData.user.name}`, 'success');
                    setTimeout(() => {
                        if (userData.user.role === 'admin') {
                            window.location.href = '/admin.html';
                        } else {
                            window.location.href = '/map-v1.0.html';
                        }
                    }, 1500);
                }
            }
        });
    </script>
</body>
</html>
