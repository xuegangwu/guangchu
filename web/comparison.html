<!DOCTYPE html>
<html lang="zh-CN">
<head><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对比分析 - 光储投资地图</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .header h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .comparison-list {
            list-style: none;
        }
        
        .comparison-item {
            padding: 16px;
            margin-bottom: 12px;
            background: #f5f7fa;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .province-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .grade-badge {
            padding: 6px 16px;
            border-radius: 980px;
            font-weight: 700;
            font-size: 14px;
            color: white;
        }
        
        .grade-A { background: #10b981; }
        .grade-B { background: #3b82f6; }
        .grade-C { background: #f59e0b; }
        .grade-D { background: #ef4444; }
        
        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 对比分析</h1>
            <p>最多可对比 3 个省份，分析各维度差异</p>
        </div>
        
        <div id="comparison-content">
            <!-- 对比列表 -->
            <div class="card" style="margin-bottom: 20px;">
                <div class="card-title">📋 已选省份</div>
                <ul class="comparison-list" id="comparison-list">
                    <!-- 动态填充 -->
                </ul>
                <button class="btn" onclick="goToMap()">➕ 添加省份</button>
            </div>
            
            <!-- 对比图表 -->
            <div class="grid" id="charts-grid" style="display: none;">
                <div class="card">
                    <div class="card-title">📊 综合评分对比</div>
                    <div class="chart-container">
                        <canvas id="scoreChart"></canvas>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">🎯 多维度雷达图</div>
                    <div class="chart-container">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">📈 历史趋势对比</div>
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">📋 详细数据对比</div>
                    <div class="chart-container">
                        <canvas id="dataChart"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="empty-state" id="empty-state">
                <h2>📭 暂无对比数据</h2>
                <p style="margin: 16px 0;">请先从地图页面选择省份进行对比</p>
                <button class="btn" onclick="goToMap()">前往地图页面</button>
            </div>
        </div>
    </div>
    
    <script>
        let charts = {};
        
        // 初始化
        function init() {
            const comparison = JSON.parse(localStorage.getItem('comparison') || '[]');
            
            if (comparison.length === 0) {
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('charts-grid').style.display = 'none';
            } else {
                document.getElementById('empty-state').style.display = 'none';
                document.getElementById('charts-grid').style.display = 'grid';
                renderComparisonList(comparison);
                initCharts(comparison);
            }
        }
        
        // 渲染对比列表
        function renderComparisonList(comparison) {
            const list = document.getElementById('comparison-list');
            list.innerHTML = comparison.map((item, index) => `
                <li class="comparison-item">
                    <div class="province-info">
                        <span class="grade-badge grade-${item.grade || 'B'}">${item.grade || 'B'}级</span>
                        <div>
                            <strong>${item.name}</strong>
                            <div style="font-size: 12px; color: #666;">得分：${item.score || 0}</div>
                        </div>
                    </div>
                    <button class="remove-btn" onclick="removeProvince(${index})">移除</button>
                </li>
            `).join('');
        }
        
        // 初始化图表
        function initCharts(comparison) {
            initScoreChart(comparison);
            initRadarChart(comparison);
            initTrendChart(comparison);
            initDataChart(comparison);
        }
        
        // 综合评分柱状图
        function initScoreChart(comparison) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            charts.score = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: comparison.map(p => p.name),
                    datasets: [{
                        label: '综合得分',
                        data: comparison.map(p => p.score || 80),
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.6)',
                            'rgba(118, 75, 162, 0.6)',
                            'rgba(245, 158, 11, 0.6)'
                        ],
                        borderColor: [
                            'rgb(102, 126, 234)',
                            'rgb(118, 75, 162)',
                            'rgb(245, 158, 11)'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: 60,
                            max: 100
                        }
                    }
                }
            });
        }
        
        // 多维度雷达图
        function initRadarChart(comparison) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const colors = [
                'rgba(102, 126, 234, 0.2)',
                'rgba(118, 75, 162, 0.2)',
                'rgba(245, 158, 11, 0.2)'
            ];
            const borderColors = [
                'rgb(102, 126, 234)',
                'rgb(118, 75, 162)',
                'rgb(245, 158, 11)'
            ];
            
            charts.radar = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['资源禀赋', '电价政策', '市场条件', '电网条件', '政策稳定性', '风险评估'],
                    datasets: comparison.map((p, i) => ({
                        label: p.name,
                        data: [
                            p.scores?.resource || 75,
                            p.scores?.price || 85,
                            p.scores?.market || 80,
                            p.scores?.grid || 85,
                            p.scores?.policy || 85,
                            p.scores?.risk || 85
                        ],
                        backgroundColor: colors[i],
                        borderColor: borderColors[i],
                        borderWidth: 2
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 100
                        }
                    }
                }
            });
        }
        
        // 历史趋势图
        function initTrendChart(comparison) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const colors = [
                'rgb(102, 126, 234)',
                'rgb(118, 75, 162)',
                'rgb(245, 158, 11)'
            ];
            
            charts.trend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['2024', '2025', '2026'],
                    datasets: comparison.map((p, i) => ({
                        label: p.name,
                        data: [
                            p.history?.[0]?.score || 80,
                            p.history?.[1]?.score || 82,
                            p.history?.[2]?.score || 84
                        ],
                        borderColor: colors[i],
                        backgroundColor: colors[i].replace('rgb', 'rgba').replace(')', ', 0.1)'),
                        tension: 0.4,
                        fill: true
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: 60,
                            max: 100
                        }
                    }
                }
            });
        }
        
        // 详细数据对比
        function initDataChart(comparison) {
            const ctx = document.getElementById('dataChart').getContext('2d');
            charts.data = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: comparison.map(p => p.name),
                    datasets: [{
                        label: '燃煤基准价 (元/kWh)',
                        data: comparison.map(p => p.data?.coalPrice || 0.4),
                        backgroundColor: 'rgba(16, 185, 129, 0.6)',
                        borderColor: 'rgb(16, 185, 129)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }
        
        // 移除省份
        function removeProvince(index) {
            const comparison = JSON.parse(localStorage.getItem('comparison') || '[]');
            comparison.splice(index, 1);
            localStorage.setItem('comparison', JSON.stringify(comparison));
            location.reload();
        }
        
        // 前往地图
        function goToMap() {
            window.location.href = 'map-v1.0.html';
        }
        
        // 页面加载
        window.onload = init;
    </script>
</body>
</html>
