<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳洲光储投资地图 - 光储龙虾</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #0f172a; color: #fff; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .header a { color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 4px; }
        #map { height: calc(100vh - 70px); }
        .legend { background: rgba(255,255,255,0.95); padding: 12px; border-radius: 8px; color: #333; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌏 澳洲光储投资地图</h1>
        <a href="/">← 返回首页</a>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-25, 135], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        
        var regions = [
            {name: '新南威尔士州', lat: -33.9, lng: 151.2, score: 85, desc: '悉尼周边, 高电价, 政策支持'},
            {name: '维多利亚州', lat: -37.8, lng: 145.0, score: 82, desc: '墨尔本周边, 储能需求大'},
            {name: '昆士兰州', lat: -27.5, lng: 153.0, score: 88, desc: '阳光充足, 太阳能资源丰富'},
            {name: '南澳大利亚', lat: -34.9, lng: 138.6, score: 80, desc: '阿德莱德, 储能项目多'},
            {name: '西澳大利亚', lat: -31.9, lng: 115.9, score: 75, desc: '珀斯, 矿业用电需求大'},
            {name: '新西兰', lat: -41.3, lng: 174.8, score: 70, desc: '可再生能源潜力大'}
        ];
        
        regions.forEach(function(r) {
            var color = r.score >= 80 ? '#22c55e' : r.score >= 70 ? '#eab308' : '#ef4444';
            L.circleMarker([r.lat, r.lng], {
                radius: 10 + r.score/10,
                fillColor: color,
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.7
            }).bindPopup('<b>' + r.name + '</b><br>评分: ' + r.score + '<br>' + r.desc).addTo(map);
        });
    </script>
</body>
</html>
