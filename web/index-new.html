<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光储龙虾 - 全球光伏储能信息系统</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; background: #fff; color: #202124; }
        
        .header { display: flex; justify-content: flex-end; align-items: center; padding: 16px 24px; gap: 20px; }
        .header a { color: #202124; text-decoration: none; font-size: 14px; }
        .header a:hover { text-decoration: underline; }
        
        .main { display: flex; flex-direction: column; align-items: center; padding: 80px 20px 40px; }
        
        .logo { font-size: 80px; margin-bottom: 16px; }
        .logo-text { font-size: 28px; font-weight: 400; margin-bottom: 32px; }
        
        .search-box { width: 100%; max-width: 580px; margin-bottom: 24px; }
        .search-input { width: 100%; padding: 16px 24px; font-size: 16px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; }
        .search-input:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
        
        .buttons { display: flex; gap: 12px; margin-bottom: 40px; }
        .btn { padding: 12px 24px; background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; color: #3c4043; font-size: 14px; cursor: pointer; }
        .btn:hover { background: #f8f9fa; border-color: #dadce0; }
        
        .quick-links { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
        .quick-link { display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; color: #202124; }
        .quick-link-icon { width: 56px; height: 56px; background: #f1f3f4; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .quick-link:hover .quick-link-icon { background: #e8f0fe; }
        .quick-link span { font-size: 14px; }
        
        .stats { display: flex; gap: 32px; margin-top: 48px; padding: 20px 32px; background: #f8f9fa; border-radius: 8px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 28px; font-weight: 500; color: #1a73e8; }
        .stat-label { font-size: 13px; color: #5f6368; margin-top: 4px; }
        
        .footer { margin-top: 60px; padding: 24px; text-align: center; color: #70757a; font-size: 14px; border-top: 1px solid #e0e0e0; }
        .footer a { color: #70757a; text-decoration: none; }
        
        @media (max-width: 600px) {
            .header { justify-content: center; flex-wrap: wrap; }
            .main { padding: 40px 16px; }
            .logo { font-size: 56px; }
            .logo-text { font-size: 20px; }
            .quick-links { gap: 16px; }
            .quick-link-icon { width: 48px; height: 48px; font-size: 22px; }
            .stats { flex-wrap: wrap; gap: 20px; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/diary.html">研发日记</a>
        <a href="/project-intro.html">项目介绍</a>
        <a href="/investment-map.html">投资地图</a>
    </div>
    
    <div class="main">
        <div class="logo">🦞</div>
        <div class="logo-text">光储龙虾</div>
        
        <div class="search-box">
            <input type="text" class="search-input" placeholder="搜索全球光伏储能信息...">
        </div>
        
        <div class="buttons">
            <button class="btn">搜索</button>
            <button class="btn" onclick="location.href='/diary.html'">研发日记</button>
        </div>
        
        <div class="quick-links">
            <a href="/project-intro.html" class="quick-link">
                <div class="quick-link-icon">📊</div>
                <span>项目介绍</span>
            </a>
            <a href="/diary.html" class="quick-link">
                <div class="quick-link-icon">📝</div>
                <span>研发日记</span>
            </a>
            <a href="/diary-list.html" class="quick-link">
                <div class="quick-link-icon">📅</div>
                <span>日记列表</span>
            </a>
            <a href="/investment-map.html" class="quick-link">
                <div class="quick-link-icon">🗺️</div>
                <span>投资地图</span>
            </a>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">20+</div>
                <div class="stat-label">今日新闻</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">2</div>
                <div class="stat-label">信息来源</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">6</div>
                <div class="stat-label">覆盖区域</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        © 2026 光储龙虾 | <a href="#">关于</a> | <a href="#">隐私</a>
    </div>
</body>
</html>
