<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国光储投资地图 - 光储龙虾</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: #fff; }
        
        /* Header */
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .header h1 { font-size: 22px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 12px; }
        .btn { padding: 8px 20px; background: rgba(255,255,255,0.2); color: #fff; text-decoration: none; border-radius: 20px; font-size: 14px; transition: all 0.3s; border: none; cursor: pointer; }
        .btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        
        /* Main Layout */
        .main { display: flex; height: calc(100vh - 64px); }
        
        /* Map */
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; border-radius: 0; }
        
        /* Sidebar */
        .sidebar { width: 380px; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); padding: 24px; overflow-y: auto; border-left: 1px solid rgba(255,255,255,0.1); }
        
        .sidebar-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .sidebar-subtitle { font-size: 12px; color: rgba(255,255,255,0.5); }
        
        /* Score Legend */
        .legend { display: flex; gap: 12px; margin-bottom: 20px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.7); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        
        /* Province Cards */
        .province-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.3s; border: 1px solid transparent; position: relative; overflow: hidden; }
        .province-card:hover { background: rgba(255,255,255,0.1); transform: translateX(4px); }
        .province-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
        
        .province-card.rank-1::before { background: linear-gradient(180deg, #fbbf24, #f59e0b); }
        .province-card.rank-2::before { background: linear-gradient(180deg, #94a3b8, #64748b); }
        .province-card.rank-3::before { background: linear-gradient(180deg, #b45309, #92400e); }
        .province-card.rank-other::before { background: rgba(255,255,255,0.2); }
        
        .province-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .province-rank { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        .province-rank.gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
        .province-rank.silver { background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: #000; }
        .province-rank.bronze { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
        .province-rank.normal { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
        
        .province-name { font-size: 16px; font-weight: 600; }
        .province-score { font-size: 22px; font-weight: 700; }
        
        .province-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-box { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 8px; text-align: center; }
        .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
        .stat-value { font-size: 13px; font-weight: 600; }
        
        .province-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .tag { padding: 3px 10px; border-radius: 12px; font-size: 10px; }
        .tag-green { background: rgba(34,197,94,0.2); color: #22c55e; }
        .tag-yellow { background: rgba(234,179,8,0.2); color: #eab308; }
        .tag-red { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        /* Score breakdown */
        .score-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 10px; overflow: hidden; }
        .score-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
        
        /* Mobile */
        @media (max-width: 900px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; height: 40vh; }
            .header { padding: 12px 16px; }
            .header h1 { font-size: 16px; }
            .btn { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🦞 中国光储投资地图 <span style="font-size:14px;font-weight:400;opacity:0.8;">| 综合评分系统</span></h1>
        <div class="header-actions">
            <a href="/" class="btn">← 返回首页</a>
            <button class="btn" onclick="toggleView()">🔄 切换视图</button>
        </div>
    </header>
    
    <main class="main">
        <div class="map-container">
            <div id="map"></div>
        </div>
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">🏆 投资潜力排行榜</div>
                <div class="sidebar-subtitle">基于电价、辐射资源、市场潜力综合评分</div>
            </div>
            
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div>80+ 强烈推荐</div>
                <div class="legend-item"><div class="legend-dot" style="background:#eab308;"></div>65-79 推荐</div>
                <div class="legend-item"><div class="legend-dot" style="background:#ef4444;"></div><65 谨慎</div>
            </div>
            
            <div id="province-list"></div>
        </aside>
    </main>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { zoomControl: true }).setView([35, 105], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CartoDB'
        }).addTo(map);
        
        var coords = {
            '海南': [19.2, 109.7], '北京': [39.9, 116.4], '吉林': [43.9, 125.3], '辽宁': [41.8, 123.4],
            '黑龙江': [45.8, 126.5], '天津': [39.1, 117.2], '宁夏': [38.5, 106.2], '内蒙古': [40.8, 111.7],
            '青海': [36.6, 101.8], '云南': [25.0, 102.7], '河北': [38.0, 114.5], '甘肃': [36.1, 103.8],
            '山西': [37.9, 112.5], '新疆': [41.1, 85.2], '山东': [36.7, 117.0], '江苏': [32.0, 118.8],
            '河南': [34.7, 113.6], '四川': [30.6, 104.1], '陕西': [34.3, 108.9], '安徽': [31.8, 117.3],
            '湖北': [30.6, 114.3], '浙江': [30.3, 120.2], '湖南': [28.2, 112.9], '江西': [28.5, 115.9],
            '贵州': [26.6, 106.9], '福建': [26.1, 118.3], '广东': [23.4, 113.5], '广西': [22.8, 108.4],
            '重庆': [29.6, 106.5], '上海': [31.2, 121.5]
        };
        
        var data = [
            {name: '海南', score: 88.4, price: 0.40, radiation: 1688, installed: 9.5, power: 1344},
            {name: '北京', score: 86.5, price: 0.36, radiation: 1673, installed: 1.9, power: 1385},
            {name: '吉林', score: 86.4, price: 0.36, radiation: 1774, installed: 7.0, power: 1512},
            {name: '辽宁', score: 85.9, price: 0.38, radiation: 1774, installed: 15.1, power: 1496},
            {name: '黑龙江', score: 84.4, price: 0.34, radiation: 1794, installed: 8.6, power: 1547},
            {name: '天津', score: 84.3, price: 0.36, radiation: 1687, installed: 9.9, power: 1398},
            {name: '宁夏', score: 71.1, price: 0.26, radiation: 1905, installed: 35.3, power: 1574},
            {name: '内蒙古', score: 69.6, price: 0.28, radiation: 2022, installed: 50.9, power: 1703},
            {name: '青海', score: 69.5, price: 0.24, radiation: 1983, installed: 38.7, power: 1655},
            {name: '云南', score: 69.2, price: 0.33, radiation: 1698, installed: 52.0, power: 1370},
            {name: '河北', score: 64.0, price: 0.37, radiation: 1687, installed: 81.5, power: 1396},
            {name: '甘肃', score: 62.7, price: 0.20, radiation: 1751, installed: 36.5, power: 1447},
            {name: '山西', score: 58.5, price: 0.18, radiation: 1788, installed: 48.4, power: 1478},
            {name: '新疆', score: 52.9, price: 0.23, radiation: 1736, installed: 80.0, power: 1426},
            {name: '山东', score: 48.8, price: 0.25, radiation: 1620, installed: 91.7, power: 1338}
        ];
        
        // Add markers
        data.forEach(function(p) {
            var c = coords[p.name] || [35, 105];
            var color = p.score >= 80 ? '#22c55e' : p.score >= 65 ? '#eab308' : '#ef4444';
            L.circleMarker(c, {
                radius: 10 + p.score/15,
                fillColor: color,
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).bindPopup('<div style="min-width:150px;"><b style="font-size:16px;">' + p.name + '</b><br><span style="font-size:24px;font-weight:700;color:' + color + ';">' + p.score + '</span> 分<br><hr style="border:none;border-top:1px solid #eee;margin:8px 0;"><div style="font-size:12px;color:#666;">电价: ¥' + p.price + '/kWh</div><div style="font-size:12px;color:#666;">辐射: ' + p.radiation + ' kWh/m²</div><div style="font-size:12px;color:#666;">装机: ' + p.installed + ' GW</div></div>').addTo(map);
        });
        
        // Render sidebar
        var listHtml = '';
        data.forEach(function(p, i) {
            var color = p.score >= 80 ? '#22c55e' : p.score >= 65 ? '#eab308' : '#ef4444';
            var rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
            var cardClass = i < 3 ? 'rank-' + (i+1) : 'rank-other';
            var tagClass = p.score >= 80 ? 'tag-green' : p.score >= 65 ? 'tag-yellow' : 'tag-red';
            var tagText = p.score >= 80 ? '⭐⭐⭐ 强烈推荐' : p.score >= 65 ? '⭐⭐ 推荐' : '⭐ 谨慎';
            
            listHtml += '<div class="province-card ' + cardClass + '" onclick="map.flyTo(coords[\'' + p.name + '\'] || [35,105], 7)">' +
                '<div class="province-header">' +
                    '<div><span class="province-rank ' + rankClass + '">' + (i+1) + '</span> <span class="province-name">' + p.name + '</span></div>' +
                    '<div class="province-score" style="color:' + color + ';">' + p.score + '</div>' +
                '</div>' +
                '<div class="province-stats">' +
                    '<div class="stat-box"><div class="stat-label">电价</div><div class="stat-value">¥' + p.price + '</div></div>' +
                    '<div class="stat-box"><div class="stat-label">辐射</div><div class="stat-value">' + p.radiation + '</div></div>' +
                    '<div class="stat-box"><div class="stat-label">装机</div><div class="stat-value">' + p.installed + 'GW</div></div>' +
                '</div>' +
                '<div class="score-bar"><div class="score-fill" style="width:' + p.score + '%;background:' + color + ';"></div></div>' +
                '<div class="province-tags"><span class="tag ' + tagClass + '">' + tagText + '</span></div>' +
            '</div>';
        });
        document.getElementById('province-list').innerHTML = listHtml;
    </script>
</body>
</html>
