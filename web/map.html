        // 地图变量
        let map;

        let selectedProvince = null;
        let currentFilter = 'all';
        
        // 颜色映射
        const gradeColors = {
            'B': { fill: '#1890ff', border: '#096dd9' },
            'C': { fill: '#faad14', border: '#d48806' },
            'D': { fill: '#ff4d4f', border: '#cf1322' }
        };
        
        // 初始化地图
        function initMap() {
            // 创建地图，中心设在中国
            map = L.map('map').setView([35.8617, 104.1954], 4);
            
            // 添加底图（CartoDB Positron - 简洁风格）
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            
            // 添加省份标记
            provincesData.forEach(province => {
                addProvinceMarker(province);
            });
            
            // 添加图例
            addLegend();
        }
        
        // 添加省份标记
        function addProvinceMarker(province) {
            const color = gradeColors[province.grade];
            
            // 创建圆形标记
            const marker = L.circleMarker([province.lat, province.lng], {
                radius: 10 + (province.scores.total / 100) * 8,  // 根据分数调整大小
                fillColor: color.fill,
                color: color.border,
                weight: 2,
                opacity: 0.9,
                fillOpacity: 0.7
            }).addTo(map);
            
            // 绑定弹窗
            const popup = L.popup({
                maxWidth: 250,
                autoPan: true
            });
            
            const popupContent = `
                <div style="font-family: -apple-system, sans-serif;">
                    <h3 style="margin: 0 0 8px 0; color: #333;">${province.name}</h3>
                    <div style="display: inline-block; padding: 3px 8px; background: ${color.fill}; color: white; border-radius: 3px; font-size: 11px; font-weight: 600; margin-bottom: 8px;">
                        ${province.grade}级 - ${province.suggestion}
                    </div>
                    <div style="font-size: 12px; color: #666;">
                        <div style="margin-bottom: 4px;"><strong>总分:</strong> ${province.scores.total}</div>
                        <div style="margin-bottom: 4px;"><strong>资源:</strong> ${province.scores.resource} | <strong>电价:</strong> ${province.scores.price}</div>
                        <div style="margin-bottom: 4px;"><strong>政策:</strong> ${province.scores.policy} | <strong>消纳:</strong> ${province.scores.grid}</div>
                        <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee;">
                            <strong>💰 ROI:</strong> ${province.roi.payback_years.toFixed(1)}年回收
                        </div>
                    </div>
                </div>
            `;
            
            popup.setContent(popupContent);
            marker.bindPopup(popup);
            
            // 点击事件
            marker.on('click', () => {
                selectProvince(province.name);
            });
            
            markers[province.name] = marker;
        }
        
        // 添加图例
        function addLegend() {
            const legend = L.control({ position: 'bottomright' });
            
            legend.onAdd = function() {
                const div = L.DomUtil.create('div', 'legend');
                div.innerHTML = `
                    <div class="legend-title">投资等级</div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #1890ff;"></div>
                        <span>B 级 - 推荐投资</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #faad14;"></div>
                        <span>C 级 - 谨慎投资</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ff4d4f;"></div>
                        <span>D 级 - 暂不建议</span>
                    </div>
                `;
                return div;
            };
            
            legend.addTo(map);
        }
        
        // 选择省份
        function selectProvince(name) {
            selectedProvince = name;
            const province = provincesData.find(p => p.name === name);
            
            // 更新列表选中状态
            document.querySelectorAll('.province-item').forEach(item => {
                item.classList.remove('selected');
                if (item.dataset.name === name) {
                    item.classList.add('selected');
                }
            });
            
            // 地图飞到该省份
            if (province && markers[name]) {
                map.flyTo([province.lat, province.lng], 6, {
                    duration: 1.5
                });
                markers[name].openPopup();
            }
            
            // 显示详情
            showDetail(province);
        }
        
        // 显示详情
        function showDetail(province) {
            const section = document.getElementById('detail-section');
            section.style.display = 'block';
            
            document.getElementById('detail-province-name').textContent = province.name;
            document.getElementById('detail-grade').textContent = province.grade + '级';
            document.getElementById('detail-total-score').textContent = province.scores.total.toFixed(1);
            document.getElementById('detail-resource').textContent = province.scores.resource;
            document.getElementById('detail-price').textContent = province.scores.price;
            document.getElementById('detail-policy').textContent = province.scores.policy;
            document.getElementById('detail-grid').textContent = province.scores.grid.toFixed(0);
            
            // ROI
            document.getElementById('roi-investment').textContent = Math.round(province.roi.total_investment).toLocaleString();
            document.getElementById('roi-revenue').textContent = Math.round(province.roi.annual_revenue).toLocaleString();
            document.getElementById('roi-net').textContent = Math.round(province.roi.annual_net).toLocaleString();
            document.getElementById('roi-payback').textContent = province.roi.payback_years.toFixed(1);
            
            // 滚动到详情
            section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // 渲染省份列表
        function renderProvinceList(filter = 'all') {
            const container = document.getElementById('province-list');
            container.innerHTML = '';
            
            const filtered = filter === 'all' 
                ? provincesData 
                : provincesData.filter(p => p.grade === filter);
            
            // 按总分排序
            filtered.sort((a, b) => b.scores.total - a.scores.total);
            
            filtered.forEach((province, index) => {
                const item = document.createElement('div');
                item.className = `province-item grade-${province.grade.toLowerCase()}${selectedProvince === province.name ? ' selected' : ''}`;
                item.dataset.name = province.name;
                item.onclick = () => selectProvince(province.name);
                
                item.innerHTML = `
                    <div class="province-info">
                        <div class="province-name">${index + 1}. ${province.name}</div>
                        <div class="province-score">总分：${province.scores.total.toFixed(1)}</div>
                    </div>
                    <span class="grade-badge">${province.grade}级</span>
                `;
                
                container.appendChild(item);
            });
        }
        
        // 筛选等级
        function filterGrade(grade) {
            currentFilter = grade;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.grade === grade) {
                    btn.classList.add('active');
                }
            });
            
            renderProvinceList(grade);
            
            // 更新地图标记显示
            Object.keys(markers).forEach(name => {
                const province = provincesData.find(p => p.name === name);
                if (grade === 'all' || province.grade === grade) {
                    markers[name].addTo(map);
                } else {
                    map.removeLayer(markers[name]);
                }
            });
        }
        
        // 搜索省份
        function searchProvince() {
            const query = document.getElementById('search-input').value.toLowerCase();
            
            if (!query) {
                renderProvinceList(currentFilter);
                return;
            }
            
            const filtered = provincesData.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.abbr.toLowerCase().includes(query)
            );
            
            const container = document.getElementById('province-list');
            container.innerHTML = '';
            
            filtered.forEach((province, index) => {
                const item = document.createElement('div');
                item.className = `province-item grade-${province.grade.toLowerCase()}${selectedProvince === province.name ? ' selected' : ''}`;
                item.dataset.name = province.name;
                item.onclick = () => selectProvince(province.name);
                
                item.innerHTML = `
                    <div class="province-info">
                        <div class="province-name">${index + 1}. ${province.name}</div>
                        <div class="province-score">总分：${province.scores.total.toFixed(1)}</div>
                    </div>
                    <span class="grade-badge">${province.grade}级</span>
                `;
                
                container.appendChild(item);
            });
        }
        
        // 切换侧边栏
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.style.display = sidebar.style.display === 'none' ? 'block' : 'none';
        }

            if (format === 'json') {
                content = JSON.stringify({
                    generated_at: new Date().toISOString(),

                }, null, 2);
                filename = 'china-solar-storage-provinces.json';

                    p.scores.grid.toFixed(0),

                    p.roi.irr_approx.toFixed(2)
                ]);
                
                content = [headers, ...rows].map(row => row.join(',')).join('\n');
                filename = 'china-solar-storage-provinces.csv';
                mimeType = 'text/csv';
            }
            
            // 创建下载链接
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initMap();
            renderProvinceList();
            
            // 更新统计
            document.getElementById('stat-total').textContent = provincesData.length;
            document.getElementById('stat-grade-b').textContent = provincesData.filter(p => p.grade === 'B').length;
            document.getElementById('stat-grade-c').textContent = provincesData.filter(p => p.grade === 'C').length;
        });
    </script>
</body>
</html>
