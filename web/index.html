<!DOCTYPE html>
<html lang="zh-CN">
<head><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光储龙虾 - 全球光伏储能信息系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            background: #fff;
            color: #202124;
        }
        
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px 24px;
            gap: 16px;
        }
        
        .header a {
            color: #202124;
            text-decoration: none;
            font-size: 13px;
        }
        
        .header a:hover {
            text-decoration: underline;
        }
        
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
            min-height: 60vh;
        }
        
        .logo {
            font-size: 72px;
            margin-bottom: 24px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin-bottom: 32px;
        }
        
        .search-box {
            width: 100%;
            max-width: 584px;
            margin-bottom: 24px;
        }
        
        .search-input {
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            outline: none;
            transition: box-shadow 0.2s;
        }
        
        .search-input:hover,
        .search-input:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
        
        .buttons {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 12px 24px;
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #f8f9fa;
            border-color: #dadce0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }
        
        .quick-links {
            display: flex;
            gap: 24px;
            margin-top: 48px;
        }
        
        .quick-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #202124;
        }
        
        .quick-link-icon {
            width: 48px;
            height: 48px;
            background: #f1f3f4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .quick-link:hover .quick-link-icon {
            background: #e8f0fe;
        }
        
        .quick-link span {
            font-size: 13px;
        }
        
        .stats {
            margin-top: 48px;
            padding: 16px 24px;
            background: #f1f3f4;
            border-radius: 8px;
            display: flex;
            gap: 32px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 500;
            color: #1a73e8;
        }
        
        .stat-label {
            font-size: 12px;
            color: #5f6368;
        }
        
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #f2f2f2;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #70757a;
        }
        
        .footer a {
            color: #70757a;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/diary.html">研发日记</a>
        <a href="/project-intro.html">项目介绍</a>
        <a href="/map-v1.0.html">投资地图</a>
    </div>
    
    <div class="main">
        <div class="logo">🦞</div>
        <div class="logo-text">光储龙虾</div>
        
        <div class="search-box">
            <input type="text" class="search-input" placeholder="搜索全球光伏储能信息..." id="searchInput">
        </div>
        
        <div class="buttons">
            <button class="btn" onclick="search()">搜索</button>
            <button class="btn" onclick="window.location.href='/diary.html'">研发日记</button>
        </div>
        
        <div class="quick-links">
            <a href="/project-intro.html" class="quick-link">
                <div class="quick-link-icon">📊</div>
                <span>项目介绍</span>
            </a>
            <a href="/diary.html" class="quick-link">
                <div class="quick-link-icon">📝</div>
                <span>研发日记</span>
            </a>
            <a href="/diary-list.html" class="quick-link">
                <div class="quick-link-icon">📅</div>
                <span>日记列表</span>
            </a>
            <a href="/investment-map.html" class="quick-link">
                <div class="quick-link-icon">🗺️</div>
                <span>投资地图</span>
            </a>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">20+</div>
                <div class="stat-label">今日新闻</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">2</div>
                <div class="stat-label">信息来源</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">2</div>
                <div class="stat-label">覆盖区域</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div>
            <a href="#">关于</a>
            <a href="#">隐私</a>
            <a href="#">条款</a>
        </div>
        <div>
            © 2026 光储龙虾
        </div>
    </div>
    
    <script>
        function search() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                window.location.href = '/search?q=' + encodeURIComponent(query);
            }
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });
    </script>
</body>
</html>
