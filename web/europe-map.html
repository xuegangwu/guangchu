<!DOCTYPE html>
<html lang="zh-CN">
<head><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欧洲区光储投资地图</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-theme.css">
    <link rel="stylesheet" href="../css/mobile-optimized.css">
    <style>
        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .region-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 980px;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #3b82f6;
        }
        
        .country-list {
            display: grid;
            gap: 16px;
        }
        
        .country-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .country-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        
        .country-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .country-name {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
        }
        
        .country-flag {
            font-size: 32px;
            margin-right: 12px;
        }
        
        .grade-badge {
            padding: 6px 16px;
            border-radius: 980px;
            font-weight: 700;
            font-size: 14px;
        }
        
        .grade-A { background: #10b981; color: white; }
        .grade-B { background: #3b82f6; color: white; }
        .grade-C { background: #f59e0b; color: white; }
        
        .country-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .country-metric {
            padding: 12px;
            background: #f5f7fa;
            border-radius: 8px;
        }
        
        .metric-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        
        .metric-value {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .region-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .region-btn {
            padding: 12px 24px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .region-btn:hover {
            border-color: #3b82f6;
        }
        
        .region-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="region-badge">🇪🇺 欧洲地区</div>
        <h1>🌍 欧洲区光储投资地图</h1>
        <p>覆盖 8 个主要欧洲国家 · 2026 年最新数据</p>
    </div>
    
    <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
        <!-- 区域选择器 -->
        <div class="region-selector">
            <button class="region-btn" onclick="window.location.href='map-v1.0.html'">🇨🇳 中国区</button>
            <button class="region-btn active">🇪🇺 欧洲区</button>
            <button class="region-btn" onclick="alert('东南亚区即将上线！')">🌏 东南亚区（即将上线）</button>
        </div>
        
        <!-- 区域统计 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">国家数量</div>
                <div class="stat-value">8</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">平均得分</div>
                <div class="stat-value">87.4</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">A 级国家</div>
                <div class="stat-value">6</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总装机容量</div>
                <div class="stat-value">250<span style="font-size: 16px; color: #666;"> GW</span></div>
            </div>
        </div>
        
        <!-- 国家列表 -->
        <div class="country-list" id="country-list">
            <!-- 动态填充 -->
        </div>
    </div>
    
    <script type="module">
        // 欧洲国家数据
        const countries = [
            {
                id: 102,
                name: '西班牙',
                flag: '🇪🇸',
                score: 90.2,
                grade: 'A',
                resource: 95,
                price: 88,
                policy: 90,
                utilization: 1650,
                subsidy: 0.12
            },
            {
                id: 106,
                name: '葡萄牙',
                flag: '🇵🇹',
                score: 89.5,
                grade: 'A',
                resource: 92,
                price: 85,
                policy: 92,
                utilization: 1550,
                subsidy: 0.14
            },
            {
                id: 101,
                name: '德国',
                flag: '🇩🇪',
                score: 88.5,
                grade: 'A',
                resource: 72,
                price: 95,
                policy: 95,
                utilization: 1050,
                subsidy: 0.15
            },
            {
                id: 108,
                name: '希腊',
                flag: '🇬🇷',
                score: 88.2,
                grade: 'A',
                resource: 94,
                price: 82,
                policy: 90,
                utilization: 1600,
                subsidy: 0.16
            },
            {
                id: 105,
                name: '荷兰',
                flag: '🇳🇱',
                score: 86.8,
                grade: 'A',
                resource: 68,
                price: 92,
                policy: 92,
                utilization: 950,
                subsidy: 0.10
            },
            {
                id: 103,
                name: '意大利',
                flag: '🇮🇹',
                score: 87.8,
                grade: 'A',
                resource: 90,
                price: 92,
                policy: 88,
                utilization: 1450,
                subsidy: 0.13
            },
            {
                id: 104,
                name: '法国',
                flag: '🇫🇷',
                score: 85.5,
                grade: 'B',
                resource: 75,
                price: 90,
                policy: 85,
                utilization: 1150,
                subsidy: 0.11
            },
            {
                id: 107,
                name: '波兰',
                flag: '🇵🇱',
                score: 82.5,
                grade: 'B',
                resource: 70,
                price: 78,
                policy: 85,
                utilization: 1100,
                subsidy: 0.08
            }
        ];
        
        // 渲染国家列表
        function renderCountries() {
            const list = document.getElementById('country-list');
            
            list.innerHTML = countries.map(country => `
                <div class="country-card" onclick="viewCountryDetail(${country.id})">
                    <div class="country-header">
                        <div style="display: flex; align-items: center;">
                            <span class="country-flag">${country.flag}</span>
                            <div>
                                <div class="country-name">${country.name}</div>
                                <div style="font-size: 12px; color: #666;">综合得分：${country.score}分</div>
                            </div>
                        </div>
                        <span class="grade-badge grade-${country.grade}">${country.grade}级</span>
                    </div>
                    
                    <div class="country-grid">
                        <div class="country-metric">
                            <div class="metric-label">资源禀赋</div>
                            <div class="metric-value">${country.resource}分</div>
                        </div>
                        <div class="country-metric">
                            <div class="metric-label">电价政策</div>
                            <div class="metric-value">${country.price}分</div>
                        </div>
                        <div class="country-metric">
                            <div class="metric-label">政策稳定性</div>
                            <div class="metric-value">${country.policy}分</div>
                        </div>
                        <div class="country-metric">
                            <div class="metric-label">年利用小时</div>
                            <div class="metric-value">${country.utilization}</div>
                        </div>
                        <div class="country-metric">
                            <div class="metric-label">补贴力度</div>
                            <div class="metric-value">${(country.subsidy * 100).toFixed(0)}%</div>
                        </div>
                        <div class="country-metric">
                            <div class="metric-label" style="color: #667eea;">👁️ 查看详情</div>
                            <div class="metric-value" style="color: #667eea;">→</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 查看详情
        window.viewCountryDetail = function(id) {
            window.location.href = `europe-country-detail.html?id=${id}`;
        };
        
        // 初始化
        renderCountries();
    </script>
</body>
</html>
